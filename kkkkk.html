<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachtabzGf</title>

<style>
body {
  margin: 0;
  padding-bottom: 90px;
  font-family: 'Segoe UI', sans-serif;
  background-color: #fff8e1;
}

/* HEADER */
header {
  background-color: #ff9800;
  color: white;
  text-align: center;
  padding: 15px;
  position: sticky;
  top: 0;
}

/* FILTER */
.filter-bar {
  display: flex;
  justify-content: flex-start;
  gap: 10px;
  margin: 10px;
  overflow-x: auto;
  padding-bottom: 5px;
  scroll-behavior: smooth;
}

.filter-bar::-webkit-scrollbar {
  height: 6px;
}

.filter-bar::-webkit-scrollbar-thumb {
  background: #ff9800;
  border-radius: 3px;
}

.filter-bar button {
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  background: white;
  color: #ff9800;
  font-weight: bold;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}

.filter-bar button.active {
  background: #ff9800;
  color: white;
}

.filter-bar button.dragging {
  opacity: 0.5;
  border: 2px dashed #ff9800;
}

/* GALLERY */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.gallery-item {
  border-radius: 12px;
  overflow: hidden;
  background: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.3s;
}

.gallery-item:hover {
  transform: translateY(-5px);
}

.gallery-item img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  text-align: center;
}

.price-tag {
  background: orange;
  color: white;
  text-align: center;
  padding: 5px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: white;
  padding: 10px;
  border-radius: 10px;
  max-width: 95%;
  max-height: 90%;
  overflow: auto;
}

#modalImage {
  width:100%;
  max-height:80vh;
  object-fit:contain;
  border-radius:10px;
  display:block;
}

#playVideoBtn {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background: rgba(0,0,0,0.6);
  color:white;
  border:none;
  padding:15px 25px;
  font-size:18px;
  border-radius:50%;
  cursor:pointer;
}

/* CONTACT BUTTONS DESIGN IN MODAL */
.modal-content .contact-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
}

.modal-content .contact-buttons a {
  flex: 1;
  text-align: center;
  text-decoration: none;
  padding: 10px 15px;
  border-radius: 8px;
  font-weight: bold;
  color: white;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.modal-content .contact-buttons a.whatsapp {
  background: #25D366;
}

.modal-content .contact-buttons a.messenger {
  background: #0084FF;
}

.modal-content .contact-buttons a:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

/* FOOTER */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: linear-gradient(45deg, #ff9800, #ff5722);
  color: white;
  text-align: center;
  padding: 10px 5px;
  z-index: 100;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
}

.footer-content {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.contact-btn {
  background: white;
  color: #ff9800;
  padding: 6px 12px;
  border-radius: 20px;
  font-weight: bold;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.contact-btn.messenger {
  color: #0084ff;
}

.footer-brand {
  font-size: 12px;
}

.hide-footer {
  display: none;
}

#media video {
  width: 100%;
  max-height: 80vh;
  object-fit: contain;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>

</header>

<div class="filter-bar">

    <button class="filter-btn" data-filter="White kelso">White kelso</button>
</div>

<main class="gallery-grid">
<div class="gallery-item" data-category="Boston" data-title="Boston" data-price="₱3,500" data-desc="F1 Boston" data-video="bostonvideo1.mp4">

<img src="bostonimage2.jpeg">

</div>
<div class="gallery-item" data-category="Boston" data-title="Boston" data-price="₱5,500" data-desc="F1 Boston" data-video="bostonvideo3.mp4">
<img src="bostonimage3.jpeg">
<div class="info"><h3>Boston</h3></div>

</div>
<div class="gallery-item" data-category="Golden boy" data-title="Golden boy" data-price="₱2,500" data-desc="pure golden boy" data-video="goldenboyvideo1.mp4">
<img src="goldenboyimage1.jpg">

<div class="gallery-item" data-category="Melsim black" data-title="Melsim black" data-price="₱5,500" data-desc="straight melsim" data-video="melsimblackvideo1.mp4">
<img src="melsimblackimage1.jpeg">

</div>
<div class="gallery-item" data-category="Hatch grey" data-title="Hatch grey" data-price="₱5,500" data-desc="F1" data-video="hatchgreyvideo1.mp4">
<img src="hatchgreyimage1.jpeg">

</div>

<img src="regulargreyimage1.jpeg">

</div>
<div class="gallery-item" data-category="White kelso" data-title="White kelso" data-price="₱5,500" data-desc="straight breed" data-video="whitekelsovideo1.mp4">
<img src="whitekelsoimage1.jpeg">

</div>
</main>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div style="position: relative;">
      <img id="modalImage" src="">
      <button id="playVideoBtn">▶️</button>
    </div>
    <div id="media" style="display:none;"></div>
    <h2 id="title"></h2>
    <p id="desc"></p>
    <h3 id="price"></h3>

    <div class="contact-buttons">
      <a id="whatsappBtn" class="whatsapp" target="_blank">📱 WhatsApp</a>
      <a id="messengerBtn" class="messenger" target="_blank">💬 Messenger</a>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-content">
    <a href="https://wa.me/639085123194" target="_blank" class="contact-btn">📱 Call/Text</a>
    <a href="https://m.me/splasher11" target="_blank" class="contact-btn messenger">💬 Messenger</a>
  </div>
  <div class="footer-brand">@coachtabzgf 2026</div>
</footer>

<script>
const items = document.querySelectorAll('.gallery-item');
const modal = document.getElementById('modal');
const title = document.getElementById('title');
const desc = document.getElementById('desc');
const price = document.getElementById('price');
const media = document.getElementById('media');
const footer = document.querySelector('footer');
const whatsappBtn = document.getElementById('whatsappBtn');
const messengerBtn = document.getElementById('messengerBtn');
const modalImage = document.getElementById('modalImage');
const playVideoBtn = document.getElementById('playVideoBtn');
const filterBar = document.querySelector('.filter-bar');
const btns = document.querySelectorAll('.filter-btn');

// OPEN MODAL WITH IMAGE
items.forEach(item=>{
  item.onclick = () => {
    const name = item.dataset.title;
    const imgSrc = item.querySelector('img').src;
    const videoSrc = item.dataset.video;

    modalImage.src = imgSrc;
    modalImage.style.display = 'block';
    media.style.display = 'none';
    playVideoBtn.style.display = 'block';

    title.innerText = name;
    desc.innerText = item.dataset.desc;
    price.innerText = item.dataset.price;

    const msg = encodeURIComponent("Hello! Interested ko sa: " + name);
    whatsappBtn.href = "https://wa.me/639085123194?text=" + msg;
    messengerBtn.href = "https://m.me/splasher11";

    modal.style.display = "flex";
    footer.classList.add('hide-footer');

    playVideoBtn.onclick = () => {
      modalImage.style.display = 'none';
      playVideoBtn.style.display = 'none';
      media.style.display = 'block';
      media.innerHTML = `<video src="${videoSrc}" controls autoplay></video>`;
    }
  }
});
// CLOSE MODAL
modal.onclick = (e) => {
  if(e.target === modal){
    closeModal();
  }
};

function closeModal(){
  modal.style.display = "none";
  footer.classList.remove('hide-footer');
  media.innerHTML = '';
}


// FILTER CLICK
btns.forEach(btn=>{
  btn.onclick = () => {
    btns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter.toLowerCase();
    items.forEach(item=>{
      const cat = item.dataset.category.toLowerCase();
      item.style.display = (filter === 'all' || cat === filter) ? 'block' : 'none';
    });
  }
});

// DRAG & DROP FILTER BUTTONS (except All)
btns.forEach(btn=>{
  if(btn.dataset.filter.toLowerCase() === 'all') return;
  btn.setAttribute('draggable', true);

  btn.addEventListener('dragstart', (e)=>{
    e.dataTransfer.effectAllowed = 'move';
    btn.classList.add('dragging');
    window.dragSrcEl = btn;
  });

  btn.addEventListener('dragend', ()=>{
    btn.classList.remove('dragging');
    window.dragSrcEl = null;
  });

  btn.addEventListener('dragover', (e)=>{
    e.preventDefault();
  });

  btn.addEventListener('drop', (e)=>{
    e.preventDefault();
    const dragSrcEl = window.dragSrcEl;
    if(dragSrcEl !== btn){
      const children = Array.from(filterBar.children);
      const dragIndex = children.indexOf(dragSrcEl);
      const dropIndex = children.indexOf(btn);
      if(dragIndex < dropIndex){
        filterBar.insertBefore(dragSrcEl, btn.nextSibling);
      } else {
        filterBar.insertBefore(dragSrcEl, btn);
      }
    }
  });
});
</script>

</body>
